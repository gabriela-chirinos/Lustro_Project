<svg width="16" height="16" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

    <!-- Deep background -->
    <rect width="512" height="512" fill="#1A1714"></rect>

    <!-- Outer gold border ring — thin, refined -->
    <rect x="28" y="28" width="456" height="456" fill="none" stroke="#C4A882" stroke-width="1.5" opacity="0.35"></rect>

    <!-- Inner dot corners — wax seal feel -->
    <circle cx="28" cy="28" r="2.5" fill="#C4A882" opacity="0.5"></circle>
    <circle cx="484" cy="28" r="2.5" fill="#C4A882" opacity="0.5"></circle>
    <circle cx="28" cy="484" r="2.5" fill="#C4A882" opacity="0.5"></circle>
    <circle cx="484" cy="484" r="2.5" fill="#C4A882" opacity="0.5"></circle>

    <!-- Serif "L" — hand-crafted path, Playfair italic feel -->
    <!-- Vertical stroke -->
    <rect x="162" y="118" width="32" height="230" rx="1" fill="#C4A882"></rect>
    <!-- Horizontal base stroke -->
    <rect x="162" y="316" width="170" height="32" rx="1" fill="#C4A882"></rect>
    <!-- Serif top-left cap -->
    <rect x="144" y="118" width="68" height="10" rx="1" fill="#C4A882"></rect>
    <!-- Serif bottom-right cap on horizontal -->
    <rect x="314" y="335" width="18" height="9" rx="1" fill="#C4A882" opacity="0.85"></rect>
    <!-- Serif bottom-left -->
    <rect x="144" y="335" width="50" height="9" rx="1" fill="#C4A882" opacity="0.85"></rect>

    <!-- Shoe sole arc — curved line beneath the L, suggests sole of a dress shoe -->
    <path d="M 130 400 Q 256 445 390 400" fill="none" stroke="#C4A882" stroke-width="2.5" stroke-linecap="round" opacity="0.45"></path>

    <!-- Thin horizontal rule above sole arc — craftsman's mark -->
    <line x1="130" y1="388" x2="390" y2="388" stroke="#C4A882" stroke-width="0.75" opacity="0.25"></line>

  </svg>